<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Poki</title>
</head>
<body>
  <header>
    <div class="logo">GAMEBOX</div>
    <div class="search-box">Buscar juegos...</div>
  </header>
    <main>
        <section class="hero">
        <h1>Juega al instante</h1>
        <p>Una portada simple inspirada en una web de minijuegos. Todo es visual y estático, sin enlaces ni funciones reales.</p>
        </section>
        <section>
            <h2 class="section-title">Juegos populares</h2>
            <div class="games-grid">
                <div class="game-card">
                <div class="game-thumb"></div>
                <div class="game-info">
                    <h3>Speed Run</h3>
                    <p>Acción rápida</p>
                </div>
                </div>

                <div class="game-card">
                <div class="game-thumb" style="background: linear-gradient(135deg, #22c55e, #06b6d4);"></div>
                <div class="game-info">
                    <h3>Block Jump</h3>
                    <p>Plataformas</p>
                </div>
                </div>

                <div class="game-card">
                <div class="game-thumb" style="background: linear-gradient(135deg, #eab308, #f97316);"></div>
                <div class="game-info">
                    <h3>Drift City</h3>
                    <p>Carreras</p>
                </div>
                </div>

                <div class="game-card">
                <div class="game-thumb" style="background: linear-gradient(135deg, #8b5cf6, #ec4899);"></div>
                <div class="game-info">
                    <h3>Puzzle Pop</h3>
                    <p>Puzles</p>
                </div>
                </div>
            </div>
            </section>
